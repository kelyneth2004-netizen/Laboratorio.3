<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Collares</title>
<link rel="icon" href="perrito.png" type="image/png">
<style>
body {
    font-family: Arial;
    background: #f5f5f5;
}

h1 {
    text-align: center;
    color: #4B0082;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    padding: 20px;
}

.card {
    background: white;
    border-radius: 10px;
    padding: 10px;
    text-align: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border-radius: 10px;
}
.especial img {
    object-fit: contain;
    background: white;
    padding: 8px;
}
</style>
</head>

<body>

<h1>Collares</h1>
<a href="articulo3.html">⬅ Volver</a>

<div class="grid">

    <div class="card"><img src="collar1.jpg"><p>Collar 1</p><p>$3.99</p></div>
    <div class="card"><img src="collar2.jpg"><p>Collar 2</p><p>$1.99</p></div>
    <div class="card especial"><img src="collar3.jpg"><p>Collar 3</p><p>$1.99</p></div>

    <div class="card"><img src="collar4.jpg"><p>Collar 4</p><p>$5.99</p></div>
    <div class="card especial"><img src="collar5.jpg"><p>Collar 5</p><p>$2.99</p></div>
    <div class="card especial"><img src="collar6.jpg"><p>Collar 6</p><p>$4.99</p></div>

</div>

</body>
</html>
